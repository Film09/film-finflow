<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinFlow — บัญชีรายรับรายจ่าย</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #151821;
      --surface2: #1c2030;
      --border: rgba(255,255,255,0.07);
      --income: #22d3a5;
      --expense: #f4637a;
      --accent: #7b6ef6;
      --text: #e8eaf2;
      --muted: #6b7094;
      --gold: #f5c842;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(123,110,246,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 80%, rgba(34,211,165,0.08) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ===== VIEWS ===== */
    .view { display: none; }
    .view.active { display: block; }

    .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; }

    /* ===== HEADER ===== */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 40px; border-bottom: 1px solid var(--border); margin-bottom: 40px;
      animation: fadeDown .6s ease both;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.7rem; letter-spacing: -.5px; background: linear-gradient(135deg, var(--accent), var(--income)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
    .logo span { font-family: 'Sarabun', sans-serif; font-size: .75rem; font-weight: 500; display: block; -webkit-text-fill-color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    .month-nav { display: flex; align-items: center; gap: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 50px; padding: 10px 20px; }
    .month-nav button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 2px 6px; transition: color .2s; }
    .month-nav button:hover { color: var(--text); }
    #monthLabel { font-size: .95rem; font-weight: 600; min-width: 110px; text-align: center; }

    /* ===== VIEW TABS ===== */
    .view-tabs { display: flex; gap: 8px; margin-bottom: 32px; animation: fadeUp .5s .05s both; }
    .view-tab {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      color: var(--muted); cursor: pointer; font-family: 'Sarabun', sans-serif;
      font-size: .85rem; font-weight: 600; padding: 10px 20px; transition: all .2s;
    }
    .view-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .view-tab:hover:not(.active) { border-color: rgba(123,110,246,.4); color: var(--text); }

    /* ===== SUMMARY CARDS ===== */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 36px; animation: fadeUp .6s .1s ease both; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px 28px 24px; position: relative; overflow: hidden; transition: transform .25s, box-shadow .25s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,.3); }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 20px 20px 0 0; }
    .card.balance::before { background: linear-gradient(90deg, var(--accent), var(--income)); }
    .card.income::before  { background: var(--income); }
    .card.expense::before { background: var(--expense); }
    .card-label { font-size: .78rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .card-amount { font-size: 2rem; font-weight: 700; letter-spacing: -1px; }
    .card.balance .card-amount { color: var(--text); }
    .card.income  .card-amount { color: var(--income); }
    .card.expense .card-amount { color: var(--expense); }
    .card-icon { position: absolute; bottom: 20px; right: 24px; font-size: 2.2rem; opacity: .15; }

    /* ===== PROGRESS ===== */
    .progress-wrap { margin-bottom: 36px; animation: fadeUp .6s .2s ease both; }
    .progress-label { display: flex; justify-content: space-between; font-size: .82rem; color: var(--muted); margin-bottom: 10px; }
    .progress-bar { height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--income), var(--accent)); border-radius: 99px; transition: width .8s cubic-bezier(.4,0,.2,1); }

    /* ===== ADD FORM ===== */
    .add-section { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; margin-bottom: 36px; animation: fadeUp .6s .25s ease both; }
    .section-title { font-size: .8rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr 2fr 1.2fr auto; gap: 12px; align-items: end; }
    .field label { display: block; font-size: .78rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: .5px; }
    .field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Sarabun', sans-serif; font-size: .95rem; padding: 12px 16px; outline: none; transition: border-color .2s, box-shadow .2s; }
    .field input:focus, .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(123,110,246,.15); }
    .field select option { background: var(--surface2); }
    .type-toggle { display: flex; gap: 8px; }
    .type-btn { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); cursor: pointer; font-family: 'Sarabun', sans-serif; font-size: .88rem; font-weight: 600; padding: 12px 8px; transition: all .2s; }
    .type-btn.active-income  { background: rgba(34,211,165,.15); border-color: var(--income); color: var(--income); }
    .type-btn.active-expense { background: rgba(244,99,122,.15); border-color: var(--expense); color: var(--expense); }
    .add-btn { background: linear-gradient(135deg, var(--accent), #5a4fcf); border: none; border-radius: 12px; color: #fff; cursor: pointer; font-family: 'Sarabun', sans-serif; font-size: .95rem; font-weight: 700; padding: 12px 24px; white-space: nowrap; transition: opacity .2s, transform .15s; box-shadow: 0 4px 20px rgba(123,110,246,.3); }
    .add-btn:hover { opacity: .9; transform: translateY(-1px); }

    /* ===== CHART (monthly overview) ===== */
    .chart-section { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; margin-bottom: 36px; animation: fadeUp .6s .3s ease both; }
    .chart-bars { display: flex; align-items: flex-end; gap: 14px; height: 120px; margin-top: 20px; }
    .bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; cursor: pointer; }
    .bar-group:hover .bar { opacity: .75; }
    .bar-pair { display: flex; gap: 4px; align-items: flex-end; width: 100%; justify-content: center; }
    .bar { width: 14px; border-radius: 4px 4px 0 0; transition: height .7s cubic-bezier(.4,0,.2,1), opacity .2s; }
    .bar.income-bar  { background: var(--income); }
    .bar.expense-bar { background: var(--expense); }
    .bar-label { font-size: .72rem; color: var(--muted); font-weight: 500; }

    /* ===== TRANSACTIONS (month view) ===== */
    .txn-section { animation: fadeUp .6s .35s ease both; }
    .txn-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .filter-tabs { display: flex; gap: 6px; }
    .filter-tab { background: var(--surface); border: 1px solid var(--border); border-radius: 50px; color: var(--muted); cursor: pointer; font-family: 'Sarabun', sans-serif; font-size: .8rem; font-weight: 600; padding: 6px 16px; transition: all .2s; }
    .filter-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .txn-list { display: flex; flex-direction: column; gap: 10px; }
    .txn-item { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; display: flex; align-items: center; gap: 16px; padding: 18px 20px; transition: background .2s, transform .2s; animation: slideIn .3s ease both; }
    .txn-item:hover { background: var(--surface2); transform: translateX(4px); }
    .txn-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .txn-icon.income  { background: rgba(34,211,165,.12); }
    .txn-icon.expense { background: rgba(244,99,122,.12); }
    .txn-info { flex: 1; min-width: 0; }
    .txn-desc { font-size: .95rem; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .txn-cat  { font-size: .78rem; color: var(--muted); }
    .txn-date { font-size: .78rem; color: var(--muted); text-align: right; margin-right: 8px; }
    .txn-amount { font-size: 1.05rem; font-weight: 700; min-width: 110px; text-align: right; }
    .txn-amount.income  { color: var(--income); }
    .txn-amount.expense { color: var(--expense); }
    .del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; opacity: 0; padding: 4px 8px; border-radius: 6px; transition: opacity .2s, color .2s, background .2s; }
    .txn-item:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: var(--expense); background: rgba(244,99,122,.12); }

    /* ===== WEEK VIEW ===== */
    .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; animation: fadeUp .5s .1s both; }
    .week-label { font-size: 1rem; font-weight: 700; color: var(--text); }
    .week-label small { font-size: .78rem; color: var(--muted); font-weight: 400; margin-left: 8px; }
    .nav-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 8px 16px; transition: all .2s; font-family: 'Sarabun', sans-serif; }
    .nav-btn:hover { color: var(--text); border-color: var(--accent); }
    .nav-btn:disabled { opacity: .3; cursor: default; }

    /* Day-of-week strip */
    .week-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 32px; animation: fadeUp .5s .15s both; }
    .day-cell {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 14px 10px; text-align: center; cursor: pointer; transition: all .25s; position: relative;
    }
    .day-cell:hover { border-color: rgba(123,110,246,.4); transform: translateY(-2px); }
    .day-cell.selected { border-color: var(--accent); background: rgba(123,110,246,.12); }
    .day-cell.today { border-color: var(--income); }
    .day-cell.today .day-num { color: var(--income); }
    .day-name { font-size: .65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .day-num  { font-size: 1.15rem; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .day-bar-wrap { height: 36px; display: flex; align-items: flex-end; justify-content: center; gap: 3px; }
    .day-mini-bar { width: 6px; border-radius: 3px 3px 0 0; transition: height .5s cubic-bezier(.4,0,.2,1); }
    .day-mini-bar.inc { background: var(--income); }
    .day-mini-bar.exp { background: var(--expense); }
    .day-dot-row { display: flex; justify-content: center; gap: 3px; margin-top: 6px; min-height: 6px; }
    .day-dot { width: 5px; height: 5px; border-radius: 50%; }
    .day-dot.inc { background: var(--income); }
    .day-dot.exp { background: var(--expense); }

    /* Selected day detail */
    .day-detail { animation: fadeUp .4s ease both; }
    .day-detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .day-detail-title { font-size: 1.1rem; font-weight: 700; }
    .day-mini-summary { display: flex; gap: 16px; }
    .dms-item { font-size: .82rem; font-weight: 600; }
    .dms-item.inc { color: var(--income); }
    .dms-item.exp { color: var(--expense); }

    /* ===== DAILY VIEW ===== */
    .daily-wrap { animation: fadeUp .5s .1s both; }
    .day-section { margin-bottom: 28px; }
    .day-section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; background: var(--surface2); border-radius: 14px;
      margin-bottom: 10px; cursor: pointer; transition: background .2s; border: 1px solid var(--border);
    }
    .day-section-header:hover { background: rgba(123,110,246,.08); border-color: rgba(123,110,246,.3); }
    .day-section-left { display: flex; align-items: center; gap: 14px; }
    .day-section-date { font-size: .95rem; font-weight: 700; }
    .day-section-dayname { font-size: .78rem; color: var(--muted); }
    .day-section-right { display: flex; gap: 20px; align-items: center; }
    .ds-inc { color: var(--income); font-size: .88rem; font-weight: 700; }
    .ds-exp { color: var(--expense); font-size: .88rem; font-weight: 700; }
    .ds-arrow { color: var(--muted); font-size: .9rem; transition: transform .2s; }
    .day-section.collapsed .ds-arrow { transform: rotate(-90deg); }
    .day-section-body { display: flex; flex-direction: column; gap: 8px; padding-left: 8px; }
    .day-section.collapsed .day-section-body { display: none; }

    /* ===== LEGEND ===== */
    .legend { display: flex; gap: 20px; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: .75rem; color: var(--muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
    .legend-dot.inc { background: var(--income); }
    .legend-dot.exp { background: var(--expense); }

    /* ===== EMPTY ===== */
    .empty-state { text-align: center; padding: 40px 0; color: var(--muted); }
    .empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: .9rem; }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:none; } }
    @keyframes slideIn  { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:none; } }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .summary-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr 1fr; }
      .form-row .field:nth-child(3) { grid-column: 1/-1; }
      .form-row .add-btn-wrap { grid-column: 1/-1; }
      header { flex-direction: column; gap: 16px; text-align: center; }
      .week-strip { grid-template-columns: repeat(7,1fr); gap: 6px; }
      .day-name { font-size: .55rem; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="logo" onclick="goHome()">
      FinFlow
      <span>บัญชีรายรับ-รายจ่าย</span>
    </div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="monthLabel"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </header>

  <!-- VIEW TABS -->
  <div class="view-tabs">
    <button class="view-tab active" id="tab-month" onclick="switchView('month')">📅 รายเดือน</button>
    <button class="view-tab"        id="tab-week"  onclick="switchView('week')">📆 รายสัปดาห์</button>
    <button class="view-tab"        id="tab-daily" onclick="switchView('daily')">📋 รายวัน</button>
  </div>

  <!-- ============================================================ -->
  <!--  VIEW: MONTH                                                  -->
  <!-- ============================================================ -->
  <div class="view active" id="view-month">

    <!-- SUMMARY CARDS -->
    <div class="summary-grid">
      <div class="card balance">
        <div class="card-label">ยอดคงเหลือ</div>
        <div class="card-amount" id="balanceAmt">฿0</div>
        <div class="card-icon">💰</div>
      </div>
      <div class="card income">
        <div class="card-label">รายรับรวม</div>
        <div class="card-amount" id="incomeAmt">฿0</div>
        <div class="card-icon">📈</div>
      </div>
      <div class="card expense">
        <div class="card-label">รายจ่ายรวม</div>
        <div class="card-amount" id="expenseAmt">฿0</div>
        <div class="card-icon">📉</div>
      </div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span>สัดส่วนการออม</span>
        <span id="savingPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <!-- 6-MONTH CHART -->
    <div class="chart-section">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="section-title" style="margin:0">ภาพรวม 6 เดือน</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot inc"></div>รายรับ</div>
          <div class="legend-item"><div class="legend-dot exp"></div>รายจ่าย</div>
        </div>
      </div>
      <div class="chart-bars" id="chartBars"></div>
    </div>

    <!-- ADD FORM -->
    <div class="add-section">
      <div class="section-title">เพิ่มรายการ</div>
      <div class="form-row">
        <div class="field">
          <label>ประเภท</label>
          <div class="type-toggle">
            <button class="type-btn active-income" id="btnIncome" onclick="setType('income')">+ รายรับ</button>
            <button class="type-btn" id="btnExpense" onclick="setType('expense')">− รายจ่าย</button>
          </div>
        </div>
        <div class="field">
          <label>จำนวนเงิน (฿)</label>
          <input type="number" id="amtInput" placeholder="0.00" min="0" />
        </div>
        <div class="field">
          <label>รายละเอียด</label>
          <input type="text" id="descInput" placeholder="ระบุรายการ..." />
        </div>
        <div class="field">
          <label>หมวดหมู่</label>
          <select id="catInput">
            <option value="เงินเดือน">💼 เงินเดือน</option>
            <option value="ธุรกิจ">🏪 ธุรกิจ</option>
            <option value="ลงทุน">📊 การลงทุน</option>
            <option value="อื่นๆ (รายรับ)">🎁 อื่นๆ</option>
            <option value="อาหาร">🍜 อาหาร</option>
            <option value="เดินทาง">🚗 เดินทาง</option>
            <option value="ที่พัก">🏠 ที่พัก</option>
            <option value="บันเทิง">🎮 บันเทิง</option>
            <option value="สุขภาพ">🏥 สุขภาพ</option>
            <option value="ช้อปปิ้ง">🛍 ช้อปปิ้ง</option>
            <option value="การศึกษา">📚 การศึกษา</option>
            <option value="สาธารณูปโภค">💡 สาธารณูปโภค</option>
          </select>
        </div>
        <div class="add-btn-wrap">
          <button class="add-btn" onclick="addTransaction()">+ เพิ่ม</button>
        </div>
      </div>
    </div>

    <!-- TRANSACTIONS -->
    <div class="txn-section">
      <div class="txn-header">
        <div class="section-title" style="margin:0">รายการทั้งหมด</div>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all',this)">ทั้งหมด</button>
          <button class="filter-tab" onclick="setFilter('income',this)">รายรับ</button>
          <button class="filter-tab" onclick="setFilter('expense',this)">รายจ่าย</button>
        </div>
      </div>
      <div class="txn-list" id="txnList"></div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!--  VIEW: WEEK                                                   -->
  <!-- ============================================================ -->
  <div class="view" id="view-week">
    <div class="week-nav">
      <button class="nav-btn" id="prevWeekBtn" onclick="changeWeek(-1)">‹ สัปดาห์ก่อน</button>
      <div>
        <div class="week-label" id="weekLabel">สัปดาห์ที่ ...</div>
      </div>
      <button class="nav-btn" id="nextWeekBtn" onclick="changeWeek(1)">สัปดาห์หน้า ›</button>
    </div>

    <!-- Summary for week -->
    <div class="summary-grid" style="margin-bottom:24px">
      <div class="card balance">
        <div class="card-label">ยอดสัปดาห์</div>
        <div class="card-amount" id="wBalanceAmt">฿0</div>
        <div class="card-icon">💰</div>
      </div>
      <div class="card income">
        <div class="card-label">รายรับ</div>
        <div class="card-amount" id="wIncomeAmt">฿0</div>
        <div class="card-icon">📈</div>
      </div>
      <div class="card expense">
        <div class="card-label">รายจ่าย</div>
        <div class="card-amount" id="wExpenseAmt">฿0</div>
        <div class="card-icon">📉</div>
      </div>
    </div>

    <!-- 7-day strip -->
    <div class="week-strip" id="weekStrip"></div>

    <!-- Selected day detail -->
    <div class="day-detail" id="dayDetail" style="display:none">
      <div class="day-detail-header">
        <div class="day-detail-title" id="dayDetailTitle"></div>
        <div class="day-mini-summary">
          <span class="dms-item inc" id="dayDetailInc"></span>
          <span class="dms-item exp" id="dayDetailExp"></span>
        </div>
      </div>
      <div class="txn-list" id="dayDetailList"></div>
    </div>
    <div id="weekNoSelect" class="empty-state" style="padding:20px 0">
      <div class="emoji">👆</div>
      <p>เลือกวันเพื่อดูรายละเอียด</p>
    </div>
  </div>

  <!-- ============================================================ -->
  <!--  VIEW: DAILY (all days of month collapsed)                   -->
  <!-- ============================================================ -->
  <div class="view" id="view-daily">
    <div class="daily-wrap" id="dailyWrap"></div>
  </div>

</div><!-- /wrapper -->

<script>
// ===========================
//  STATE
// ===========================
const MONTHS_TH = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const DAYS_TH   = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
const DAYS_FULL = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];

let currentDate  = new Date();
let currentType  = 'income';
let filter       = 'all';
let currentView  = 'month';
let weekOffset   = 0;   // weeks from "this week"
let selectedDay  = null; // ISO date string yyyy-mm-dd

const STORE_KEY = 'finflow_txns_v2';
let transactions = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');



function save() { localStorage.setItem(STORE_KEY, JSON.stringify(transactions)); }

// ===========================
//  HELPERS
// ===========================
function fmt(n) { return '฿' + n.toLocaleString('th-TH', {minimumFractionDigits:0, maximumFractionDigits:0}); }

function fmtDate(iso) {
  const d = new Date(iso);
  return d.getDate() + ' ' + MONTHS_TH[d.getMonth()].slice(0,3) + ' ' + (d.getFullYear()+543);
}

function isoDate(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function txnsForDay(dateStr) {
  return transactions.filter(t => isoDate(new Date(t.date)) === dateStr);
}

function txnsForMonth() {
  return transactions.filter(t => {
    const d = new Date(t.date);
    return d.getMonth()===currentDate.getMonth() && d.getFullYear()===currentDate.getFullYear();
  });
}

function weekStart(offset=0) {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const mon = new Date(now); mon.setDate(now.getDate() - day + offset*7);
  mon.setHours(0,0,0,0);
  return mon;
}

// ===========================
//  VIEW SWITCHING
// ===========================
function switchView(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.view-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+v).classList.add('active');
  if (v==='week')  renderWeek();
  if (v==='daily') renderDaily();
}

function goHome() { switchView('month'); }

// ===========================
//  MONTH
// ===========================
function updateMonthLabel() {
  document.getElementById('monthLabel').textContent =
    MONTHS_TH[currentDate.getMonth()] + ' ' + (currentDate.getFullYear()+543);
}

function changeMonth(dir) {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()+dir, 1);
  render();
}

function currentMonthTxns() { return txnsForMonth(); }
function filteredTxns() {
  const all = currentMonthTxns();
  return filter==='all' ? all : all.filter(t=>t.type===filter);
}

function setType(t) {
  currentType = t;
  document.getElementById('btnIncome').className  = 'type-btn'+(t==='income'  ?' active-income':'');
  document.getElementById('btnExpense').className = 'type-btn'+(t==='expense'?' active-expense':'');
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderTxns();
}

function addTransaction() {
  const amt  = parseFloat(document.getElementById('amtInput').value);
  const desc = document.getElementById('descInput').value.trim();
  const cat  = document.getElementById('catInput').value;
  if (!amt||amt<=0) { alert('กรุณากรอกจำนวนเงิน'); return; }
  const finalDesc = desc || cat.replace(/^[\S]+\s/,'');
  transactions.unshift({ id: Date.now(), type: currentType, amount: amt, desc: finalDesc, cat, date: new Date().toISOString() });
  save();
  document.getElementById('amtInput').value  = '';
  document.getElementById('descInput').value = '';
  render();
  if (currentView==='week')  renderWeek();
  if (currentView==='daily') renderDaily();
}

function deleteTransaction(id) {
  transactions = transactions.filter(t=>t.id!==id);
  save();
  render();
  if (currentView==='week')  renderWeek();
  if (currentView==='daily') renderDaily();
}

function renderSummary() {
  const txns = currentMonthTxns();
  const inc  = txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp  = txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal  = inc-exp;
  const pct  = inc>0 ? Math.max(0,Math.round((bal/inc)*100)) : 0;
  document.getElementById('balanceAmt').textContent = fmt(bal);
  document.getElementById('incomeAmt').textContent  = fmt(inc);
  document.getElementById('expenseAmt').textContent = fmt(exp);
  document.getElementById('savingPct').textContent  = pct+'%';
  document.getElementById('progressFill').style.width = Math.min(pct,100)+'%';
}

function renderTxns() {
  const list = document.getElementById('txnList');
  const txns = filteredTxns().sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (!txns.length) { list.innerHTML=`<div class="empty-state"><div class="emoji">📂</div><p>ไม่มีรายการในเดือนนี้</p></div>`; return; }
  list.innerHTML = txns.map(t=>`
    <div class="txn-item">
      <div class="txn-icon ${t.type}">${t.type==='income'?'📥':'📤'}</div>
      <div class="txn-info">
        <div class="txn-desc">${t.desc}</div>
        <div class="txn-cat">${t.cat}</div>
      </div>
      <div class="txn-date">${fmtDate(t.date)}</div>
      <div class="txn-amount ${t.type}">${t.type==='income'?'+':'−'}${fmt(t.amount)}</div>
      <button class="del-btn" onclick="deleteTransaction(${t.id})">✕</button>
    </div>
  `).join('');
}

function renderChart() {
  const bars = document.getElementById('chartBars');
  const months = [];
  for (let i=5;i>=0;i--) {
    const d = new Date(currentDate.getFullYear(), currentDate.getMonth()-i, 1);
    const txns = transactions.filter(t=>{ const td=new Date(t.date); return td.getMonth()===d.getMonth()&&td.getFullYear()===d.getFullYear(); });
    const inc = txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp = txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    months.push({ label: MONTHS_TH[d.getMonth()].slice(0,3), inc, exp, d });
  }
  const maxVal = Math.max(...months.map(m=>Math.max(m.inc,m.exp)),1);
  bars.innerHTML = months.map(m=>{
    const ih = Math.max(4,Math.round((m.inc/maxVal)*100));
    const eh = Math.max(4,Math.round((m.exp/maxVal)*100));
    return `<div class="bar-group" title="${m.label}: รายรับ ${fmt(m.inc)} / รายจ่าย ${fmt(m.exp)}">
      <div class="bar-pair">
        <div class="bar income-bar"  style="height:${ih}px"></div>
        <div class="bar expense-bar" style="height:${eh}px"></div>
      </div>
      <div class="bar-label">${m.label}</div>
    </div>`;
  }).join('');
}

// ===========================
//  WEEK VIEW
// ===========================
function changeWeek(dir) {
  weekOffset += dir;
  selectedDay = null;
  renderWeek();
}

function renderWeek() {
  const ws = weekStart(weekOffset);
  const we = new Date(ws); we.setDate(ws.getDate()+6);

  // Label
  const fmt2 = d => d.getDate()+' '+MONTHS_TH[d.getMonth()].slice(0,3);
  document.getElementById('weekLabel').innerHTML =
    fmt2(ws)+' – '+fmt2(we)+' '+(we.getFullYear()+543);

  // Nav buttons
  document.getElementById('prevWeekBtn').disabled = false;
  document.getElementById('nextWeekBtn').disabled = false;

  // Week summary
  const days = [];
  for (let i=0;i<7;i++) {
    const d = new Date(ws); d.setDate(ws.getDate()+i);
    days.push(d);
  }
  const allTxns = days.flatMap(d => txnsForDay(isoDate(d)));
  const wInc = allTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const wExp = allTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  document.getElementById('wBalanceAmt').textContent = fmt(wInc-wExp);
  document.getElementById('wIncomeAmt').textContent  = fmt(wInc);
  document.getElementById('wExpenseAmt').textContent = fmt(wExp);

  // Max for bars
  const dayData = days.map(d => {
    const tx = txnsForDay(isoDate(d));
    return {
      d,
      iso: isoDate(d),
      inc: tx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),
      exp: tx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0),
      tx
    };
  });
  const maxDay = Math.max(...dayData.map(d=>Math.max(d.inc,d.exp)), 1);
  const todayStr = isoDate(new Date());

  const strip = document.getElementById('weekStrip');
  strip.innerHTML = dayData.map(dd => {
    const ih = Math.max(2, Math.round((dd.inc/maxDay)*32));
    const eh = Math.max(2, Math.round((dd.exp/maxDay)*32));
    const hasData = dd.tx.length>0;
    const isToday = dd.iso===todayStr;
    const isSel   = dd.iso===selectedDay;
    return `
      <div class="day-cell${isToday?' today':''}${isSel?' selected':''}" onclick="selectDay('${dd.iso}')">
        <div class="day-name">${DAYS_TH[dd.d.getDay()]}</div>
        <div class="day-num">${dd.d.getDate()}</div>
        <div class="day-bar-wrap">
          ${hasData ? `<div class="day-mini-bar inc" style="height:${ih}px"></div>
                       <div class="day-mini-bar exp" style="height:${eh}px"></div>` : ''}
        </div>
        <div class="day-dot-row">
          ${dd.tx.some(t=>t.type==='income')  ? '<div class="day-dot inc"></div>' : ''}
          ${dd.tx.some(t=>t.type==='expense') ? '<div class="day-dot exp"></div>' : ''}
        </div>
      </div>`;
  }).join('');

  renderDayDetail();
}

function selectDay(iso) {
  selectedDay = selectedDay===iso ? null : iso;
  renderWeek();
}

function renderDayDetail() {
  const detail   = document.getElementById('dayDetail');
  const noSelect = document.getElementById('weekNoSelect');
  if (!selectedDay) { detail.style.display='none'; noSelect.style.display=''; return; }
  noSelect.style.display='none'; detail.style.display='';

  const d    = new Date(selectedDay+'T00:00:00');
  const txns = txnsForDay(selectedDay).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const inc  = txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp  = txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  document.getElementById('dayDetailTitle').textContent =
    'วัน'+DAYS_FULL[d.getDay()]+' ที่ '+d.getDate()+' '+MONTHS_TH[d.getMonth()]+' '+(d.getFullYear()+543);
  document.getElementById('dayDetailInc').textContent = inc ? '+'+fmt(inc) : '';
  document.getElementById('dayDetailExp').textContent = exp ? '−'+fmt(exp) : '';

  const list = document.getElementById('dayDetailList');
  if (!txns.length) {
    list.innerHTML=`<div class="empty-state"><div class="emoji">✨</div><p>ไม่มีรายการในวันนี้</p></div>`;
    return;
  }
  list.innerHTML = txns.map(t=>`
    <div class="txn-item">
      <div class="txn-icon ${t.type}">${t.type==='income'?'📥':'📤'}</div>
      <div class="txn-info">
        <div class="txn-desc">${t.desc}</div>
        <div class="txn-cat">${t.cat}</div>
      </div>
      <div class="txn-amount ${t.type}">${t.type==='income'?'+':'−'}${fmt(t.amount)}</div>
      <button class="del-btn" onclick="deleteTransaction(${t.id})">✕</button>
    </div>
  `).join('');
}

// ===========================
//  DAILY VIEW
// ===========================
function renderDaily() {
  const wrap = document.getElementById('dailyWrap');
  const year = currentDate.getFullYear(), mon = currentDate.getMonth();
  const daysInMonth = new Date(year, mon+1, 0).getDate();
  const todayStr = isoDate(new Date());

  // Build array of days that have transactions OR are today, sorted desc
  const dayList = [];
  for (let d=1; d<=daysInMonth; d++) {
    const date = new Date(year, mon, d);
    const ds   = isoDate(date);
    const txns = txnsForDay(ds);
    if (txns.length || ds===todayStr) dayList.push({ date, ds, txns });
  }
  dayList.reverse();

  if (!dayList.length) {
    wrap.innerHTML=`<div class="empty-state"><div class="emoji">📂</div><p>ไม่มีรายการในเดือนนี้</p></div>`;
    return;
  }

  wrap.innerHTML = dayList.map(({ date, ds, txns }) => {
    const inc = txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp = txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const isToday = ds===todayStr;
    const txnHtml = txns.length ? txns.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t=>`
      <div class="txn-item">
        <div class="txn-icon ${t.type}">${t.type==='income'?'📥':'📤'}</div>
        <div class="txn-info">
          <div class="txn-desc">${t.desc}</div>
          <div class="txn-cat">${t.cat}</div>
        </div>
        <div class="txn-amount ${t.type}">${t.type==='income'?'+':'−'}${fmt(t.amount)}</div>
        <button class="del-btn" onclick="deleteTransaction(${t.id})">✕</button>
      </div>
    `).join('') : `<div class="empty-state" style="padding:16px 0"><p>ยังไม่มีรายการ</p></div>`;

    return `
      <div class="day-section" id="ds-${ds}">
        <div class="day-section-header" onclick="toggleDaySection('${ds}')">
          <div class="day-section-left">
            <div>
              <div class="day-section-date">${isToday?'📍 ':''}${date.getDate()} ${MONTHS_TH[date.getMonth()]} ${date.getFullYear()+543}</div>
              <div class="day-section-dayname">วัน${DAYS_FULL[date.getDay()]}${isToday?' · วันนี้':''}</div>
            </div>
          </div>
          <div class="day-section-right">
            ${inc ? `<span class="ds-inc">+${fmt(inc)}</span>` : ''}
            ${exp ? `<span class="ds-exp">−${fmt(exp)}</span>` : ''}
            <span class="ds-arrow">▾</span>
          </div>
        </div>
        <div class="day-section-body">${txnHtml}</div>
      </div>`;
  }).join('');
}

function toggleDaySection(ds) {
  document.getElementById('ds-'+ds).classList.toggle('collapsed');
}

// ===========================
//  RENDER ALL
// ===========================
function render() {
  updateMonthLabel();
  renderSummary();
  renderTxns();
  renderChart();
}

document.getElementById('descInput').addEventListener('keydown', e => {
  if (e.key==='Enter') addTransaction();
});

render();
</script>

<footer style="position:relative;z-index:1;text-align:center;padding:24px 0 32px;border-top:1px solid rgba(255,255,255,0.05);margin-top:20px;">
  <span style="font-size:.9rem;color:rgba(107,112,148,0.7);letter-spacing:.5px;">จัดทำโดย นายนรินทร์ธร ภู่จันทร์ &nbsp;·&nbsp; ม.5/6</span>
</footer>

</body>
</html>
